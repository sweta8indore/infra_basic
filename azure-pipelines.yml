trigger: none

pool:
 name: cicdpool

stages:
  - stage: initandplan
    displayName: init and plan
    jobs:
      - job: terraforminitplan
        steps:

        # Step 1: Install Infracost
        - powershell: |
            # Download Infracost zip
            Invoke-WebRequest https://github.com/infracost/infracost/releases/latest/download/infracost-windows-amd64.zip -OutFile infracost.zip

            # Unzip
            Expand-Archive infracost.zip -DestinationPath infracost -Force

            # Add to PATH (temporary for pipeline)
            $env:PATH += ";$(System.DefaultWorkingDirectory)\infracost"

            # Verify
            infracost --version
          displayName: "Install Infracost (Windows)"
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'init'
            backendServiceArm: 'cicdinfra_sc'
            backendAzureRmStorageAccountName: 'terraformstatefile55'
            backendAzureRmContainerName: 'tfstate'
            backendAzureRmKey: 'dev.terraform.state'
        - script: |
            terraform plan -out=tfplan.binary
            terraform show -json tfplan.binary > plan.json
            displayName: "Terraform Plan + JSON"'

        - script: |
            infracost breakdown --path=plan.json \
              --format=table
            env:
            INFRACOST_API_KEY: $(INFRACOST_API_KEY)
            displayName: "Run Infracost"

  - stage: apply
    displayName: terraform apply
    jobs: 
      - job: terraformapply
        steps:  
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'cicdinfra_sc'
              backendAzureRmStorageAccountName: 'terraformstatefile55'
              backendAzureRmContainerName: 'tfstate'
              backendAzureRmKey: 'dev.terraform.state'
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'apply'
              commandOptions: '-auto-approve'
              environmentServiceNameAzureRM: 'cicdinfra_sc'







