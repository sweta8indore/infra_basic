trigger: none

pool:
 name: cicdpool

steps:
- powershell: |
    Write-Host "Hello, World from Azure DevOps Pipeline!"
  displayName: "Hello World PS"

- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'init'
    backendServiceArm: 'cicdinfra_sc'
    backendAzureRmStorageAccountName: 'terraformstatefile55'
    backendAzureRmContainerName: 'tfstate'
    backendAzureRmKey: 'dev.terraform.state'

