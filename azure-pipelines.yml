trigger: none

pool:
  name: cicdpool

variables:
- group: infra_cost

stages:
  - stage: initandplan
    displayName: init and plan
    jobs:
      - job: terraforminitplan
        steps:

        # Step 1: Install Infracost (Windows)
        - powershell: |
            Invoke-WebRequest https://github.com/infracost/infracost/releases/latest/download/infracost-windows-amd64.zip -OutFile infracost.zip
            Expand-Archive infracost.zip -DestinationPath $(Agent.TempDirectory)\infracost -Force
            Write-Host "##vso[task.prependpath]$(Agent.TempDirectory)\infracost"
          displayName: "Install Infracost"

        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'init'
            backendServiceArm: 'cicdinfra_sc'
            backendAzureRmStorageAccountName: 'terraformstatefile55'
            backendAzureRmContainerName: 'tfstate'
            backendAzureRmKey: 'dev.terraform.state'
            backendAzureRmUseAzureAD: true

        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'plan'
            environmentServiceNameAzureRM: 'cicdinfra_sc'
            commandOptions: '-out=tfplan.binary'

        # Generate JSON plan
        - script: |
            terraform show -json tfplan.binary > plan.json
          displayName: "Generate Plan JSON"

        # Run Infracost breakdown
        - powershell: |
            infracost breakdown --path=plan.json --format=table
          env:
            INFRACOST_API_KEY: $(INFRACOST_API_KEY)
          displayName: "Infracost Breakdown"

